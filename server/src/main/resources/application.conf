ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.mapchina.server.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/mapchina"
    url = ${?DB_URL}
    driver = "org.postgresql.Driver"
    user = "mapchina"
    user = ${?DB_USER}
    password = "mapchina"
    password = ${?DB_PASSWORD}
}

jwt {
    secret = "mapchina-dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "mapchina"
    audience = "mapchina-users"
    accessTokenTtlMinutes = 30
    refreshTokenTtlDays = 30
}
