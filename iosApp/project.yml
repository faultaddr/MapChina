name: iosApp
options:
  bundleIdPrefix: com.mapchina
  deploymentTarget:
    iOS: "15.0"
  generateEmptyDirectories: true

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Resources/**"
    dependencies:
      - framework: ../shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mapchina.iosApp
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: iosApp/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        OTHER_LDFLAGS:
          - "-lsqlite3"
    preBuildScripts:
      - name: Build KMP Framework
        script: |
          export JAVA_HOME=/opt/homebrew/opt/openjdk@17
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          if [ "$EFFECTIVE_PLATFORM_NAME" = "-iphonesimulator" ]; then
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
          else
            ./gradlew :shared:linkDebugFrameworkIosArm64
          fi
    postBuildScripts:
      - name: Copy Map Data Resources
        script: |
          DATA_DIR="$SRCROOT/iosApp/Resources"
          DEST_DIR="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH"
          if [ -d "$DATA_DIR" ]; then
            cp -R "$DATA_DIR/" "$DEST_DIR/"
          fi
      - name: Copy Compose Resources
        script: |
          RESOURCES_DIR="$SRCROOT/../shared/build/generated/compose/resourceGenerator/preparedResources/commonMain/composeResources"
          DEST_DIR="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/compose-resources/composeResources/mapchina.shared.generated.resources"
          if [ -d "$RESOURCES_DIR" ]; then
            mkdir -p "$DEST_DIR"
            cp -R "$RESOURCES_DIR/" "$DEST_DIR/"
          fi
