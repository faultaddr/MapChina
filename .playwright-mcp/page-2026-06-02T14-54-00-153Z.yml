                    - text: PKCanvas
                    - text: View
                - text: object that you integrate into your existing view hierarchy. It supports the low-latency capture of touches originating from Apple Pencil or your finger. The canvas object sends final results as a
                - link "PKDrawing" [ref=e490] [cursor=pointer]:
