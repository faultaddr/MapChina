                  - text: included in the
                  - code [ref=e405]: androidx.compose.runtime:runtime-rxjava2:$composeVersion
                  - text: or
                  - code [ref=e406]: androidx.compose.runtime:runtime-rxjava3:$composeVersion
                  - text: artifact.
              - paragraph [ref=e407]:
                - text: These artifacts register as a listener and represent the values as a
