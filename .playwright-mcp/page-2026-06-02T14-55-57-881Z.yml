              - paragraph
              - heading "Usage guidelines" [level=3] [ref=e365]
              - paragraph [ref=e366]:
                - text: You usually access
                - code [ref=e367]: ViewModel
                - text: instances at
                - emphasis [ref=e368]: screen-level
                - text: composables, that is, close to a root composable called from an activity, fragment, or destination of a Navigation graph. This is because
                - code [ref=e369]: ViewModel
                - text: s are, by default, scoped to those
                - emphasis [ref=e370]: screen level
                - text: objects. Read more about a
                - code [ref=e371]: ViewModel
                - text: "'s"
                - link "lifecycle and scope here" [ref=e372] [cursor=pointer]:
                  - /url: /topic/libraries/architecture/viewmodel#lifecycle
                - text: .
              - paragraph [ref=e373]:
                - text: Try to avoid passing down
                - code [ref=e374]: ViewModel
                - text: instances to other composables as this can make those composables more difficult to test and can break
                - link "previews" [ref=e375] [cursor=pointer]:
