                - text: . Instead, pass only the data and functions they need as parameters.
              - paragraph [ref=e376]:
                - text: You
                - emphasis [ref=e377]: can
                - text: use
                - code [ref=e378]: ViewModel
                - text: instances to manage state for
                - emphasis [ref=e379]: sub screen-level
                - text: composables, however, be aware of the
                - code [ref=e380]: ViewModel
                - text: "'s"
                - link "lifecycle and scope" [ref=e381] [cursor=pointer]:
