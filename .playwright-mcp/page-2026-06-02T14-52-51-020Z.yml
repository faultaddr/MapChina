              - paragraph [ref=e911]:
                - strong [ref=e912]: New Features
              - list [ref=e913]:
                - listitem [ref=e914]: A modular and configurable library to make it easy to create, render, and manipulate beautiful ink strokes authored in your application.
              - paragraph [ref=e915]:
                - strong [ref=e916]: API Changes
              - paragraph [ref=e917]: "New modules to help developers build rich inking experiences:"
              - list [ref=e918]:
                - listitem [ref=e919]:
                  - text: "Authoring: Use"
                  - code [ref=e920]: InProgressStrokesView
                  - text: for high-performance, low latency rendering of strokes in real time as inputs are received.
                - listitem [ref=e921]:
                  - text: "Rendering: Use"
                  - code [ref=e922]: CanvasStrokeRenderer
                  - text: and
                  - code [ref=e923]: ViewStrokeRenderer
                  - text: to draw the finished ink strokes as part of an app’s user interface.
                - listitem [ref=e924]: "Strokes: Core data types used for inking features."
                - listitem [ref=e925]: "Brush: Configurable specification of how strokes will look and act in response to user input."
                - listitem [ref=e926]: "Geometry: Geometric operations like intersection and coverage to power tools like selection and erasing."
